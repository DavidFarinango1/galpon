<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render 3D — Bodegas Farinango</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:"Segoe UI", system-ui, sans-serif; background:#0f1216; color:#e8eaed; }
  #scene { position:absolute; inset:0; }
  canvas { display:block; }
  header {
    position:absolute; top:0; left:0; right:0; height:52px;
    background:rgba(14,16,20,.88); backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(255,255,255,.08);
    display:flex; align-items:center; gap:10px; padding:0 14px; z-index:10;
  }
  header .logo { font-weight:600; font-size:14px; color:#7ab8ff; white-space:nowrap; }
  header .logo span { color:#8a93a2; font-weight:400; }
  .spacer { flex:1; }
  .btn, a.btn {
    background:#262a31; border:1px solid #363c46; color:#cfd3da; border-radius:6px;
    height:28px; padding:0 10px; font-size:12.5px; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; user-select:none; text-decoration:none;
    transition:background .12s;
  }
  .btn:hover { background:#2f3540; }
  .btn.on { background:#1d3350; border-color:#3b6ea8; color:#9ecbff; }
  #views {
    position:absolute; top:64px; left:12px; z-index:10;
    display:flex; flex-direction:column; gap:4px;
    background:rgba(14,16,20,.82); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:10px;
    max-height:calc(100% - 90px); overflow-y:auto;
  }
  #views h3 { font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:#6f7682; margin:4px 0 3px; }
  #views .btn { justify-content:flex-start; width:168px; }
  #panel {
    position:absolute; top:64px; right:12px; z-index:10; width:214px;
    background:rgba(14,16,20,.82); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:12px;
    display:flex; flex-direction:column; gap:10px;
  }
  #panel h3 { font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:#6f7682; }
  #panel label.row { display:flex; align-items:center; justify-content:space-between; font-size:13px; cursor:pointer; }
  input[type=range] { width:100%; accent-color:#5b9bd5; }
  input[type=checkbox] { accent-color:#5b9bd5; width:15px; height:15px; }
  .sun-label { font-size:12px; color:#9aa0aa; display:flex; justify-content:space-between; }
  #optToggle {
    position:absolute; bottom:48px; left:50%; transform:translateX(-50%);
    z-index:11;
    background:#1d3350; border:1px solid #3b6ea8; color:#bcd9f7;
    border-radius:10px; padding:11px 22px; font-size:14.5px; font-weight:600;
    cursor:pointer; transition:background .15s, transform .1s;
    box-shadow:0 4px 18px rgba(0,0,0,.4);
  }
  #optToggle:hover { background:#264a78; transform:translateX(-50%) translateY(-1px); }
  #hint {
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    font-size:12px; color:#8a93a2; background:rgba(14,16,20,.8);
    border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:7px 14px;
    z-index:10; pointer-events:none; white-space:nowrap;
  }
  #loading {
    position:absolute; inset:0; z-index:20; background:#12151a;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
    font-size:14px; color:#9aa0aa; transition:opacity .4s;
  }
  #loading.hidden { opacity:0; pointer-events:none; }
  .spinner { width:36px; height:36px; border:3px solid #2c333d; border-top-color:#7ab8ff; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media (max-width:820px){ #panel{ display:none; } #hint{ display:none; } }
</style>
</head>
<body>

<div id="scene"></div>

<header>
  <div class="logo">BODEGAS FARINANGO <span id="subtitle">· …</span></div>
  <div class="spacer"></div>
  <a class="btn" href="index.html">📄 Ver planos PDF</a>
</header>

<div id="views">
  <h3>Vistas generales</h3>
  <button class="btn" data-view="esquina">◇ Perspectiva</button>
  <button class="btn" data-view="frente">▣ Frente (calle)</button>
  <button class="btn" data-view="rampa">↘ Rampa vehicular</button>
  <button class="btn" data-view="aerea">▲ Aérea</button>
  <button class="btn" data-view="posterior">▢ Posterior</button>
  <button class="btn" data-view="peatonal">웃 Peatonal</button>
  <button class="btn" data-view="interiorG">⌂ Interior galpones</button>
  <h3>Edificio por niveles</h3>
  <button class="btn" data-view="nivReuniones" data-lv="0">− N-3.70 · Reuniones</button>
  <button class="btn" data-view="nivCalle" data-lv="1">− N 0.00 · Exhibición</button>
  <button class="btn" data-view="nivPiso1" data-lv="2">− N+3.40 · Exhibición 1</button>
  <button class="btn" data-view="nivDepto" data-lv="3">− N+6.20 · Departamento</button>
  <button class="btn" data-view="nivTerraza" data-lv="4">− N+9.00 · Terraza</button>
</div>

<div id="panel">
  <h3>Iluminación</h3>
  <div class="sun-label"><span>☀ Hora del día</span><span id="sunTime">10:30</span></div>
  <input type="range" id="sunSlider" min="7" max="17.5" step="0.1" value="10.5">
  <h3 style="margin-top:4px">Opciones</h3>
  <label class="row">Medidas y rótulos <input type="checkbox" id="chkMedidas" checked></label>
  <label class="row">Estructura galpón nuevo <input type="checkbox" id="chkStruct"></label>
  <label class="row">Estructura y cimientos edificio <input type="checkbox" id="chkStructEdi"></label>
  <label class="row">Rotación automática <input type="checkbox" id="chkRotate"></label>
</div>

<button id="optToggle">…</button>
<div id="hint">Arrastra: girar · Rueda: zoom · Clic derecho: desplazar</div>

<div id="loading"><div class="spinner"></div><div>Construyendo modelo 3D…</div></div>

<script src="lib/three.min.js"></script>
<script src="lib/OrbitControls.js"></script>
<script>
/* ============================================================
   BODEGAS FARINANGO — conjunto conectado, dos opciones:
   OPCIÓN 1: edificio 15x12 + galpón nuevo 15x18
   OPCIÓN 2: edificio 15x15 + galpón nuevo 15x15 con 3 pórticos
             cada 6 m y volados de 1.5 m en los extremos
   X = fondo del lote (0 calle → 50) · Z = ancho (0 norte → 20 sur)
   ============================================================ */

const OPT2 = new URLSearchParams(location.search).get('opt') === '2';
const DX = OPT2 ? 3 : 0;                       // metros extra de fondo del edificio

document.getElementById('subtitle').textContent = OPT2
  ? '· OPCIÓN 2 — según planos estructurales A-1/A-2/A-3 (julio 2026)'
  : '· OPCIÓN 1 — edificio 15×12 · galpón 15×18';
const optBtn = document.getElementById('optToggle');
optBtn.textContent = OPT2 ? '◂ Mirar Opción 1' : 'Mirar Opción 2 ▸';
optBtn.addEventListener('click', () => location.href = OPT2 ? 'render.html' : 'render.html?opt=2');

const FLOOR = -3.70, DOCK = -4.90, ST = 0;
const LOT_W = 20;
const EDI = { x0:3, x1:15+DX, z0:0, z1:15 };
const GN  = { x0:15+DX, x1:33, z0:0, z1:15 };
const GE  = { x0:33, x1:45, z0:0, z1:20 };
const EAVE = 4.30, RIDGE = 5.72;        // galpón: alero 8.00 y cumbrero 9.40 sobre el piso -3.70
// Opción 2 = cotas de la lámina A-2: entrepisos uniformes de 3.40 m
const LV = OPT2 ? [-3.70, 0.13, 3.53, 6.93, 10.33] : [-3.70, 0, 3.40, 6.20, 9.00];
const Y0=LV[0], Y1=LV[1], Y2=LV[2], Y3=LV[3], Y4=LV[4];
const RAMP = { z0:15, z1:20, xTop:1.0, xBot:28.4 };
const T = 0.2;
// Núcleo panorámico: gradas que ENVUELVEN al ascensor de vidrio.
// Puerta hacia el CENTRO (sur). El tramo de subida inicia en la franja oeste
// (el lado contrario al galpón), descansa detrás del ducto (norte) y regresa
// por la franja este (junto al galpón) llegando al lado de la puerta.
const CORE = {
  xW: EDI.x1-4.9,                // franja oeste (tramo de inicio)
  xE: EDI.x1-0.3,                // franja este (tramo de regreso, junto al galpón)
  zN: 0.25, zS: 4.9,             // descanso al norte · borde sur de losa
  x1: EDI.x1-0.2,
};
const SHX0 = EDI.x1-3.65, SHX1 = EDI.x1-1.55, SHXC = (SHX0+SHX1)/2;
const SHZ0 = 1.75, SHZ1 = 3.85, SHZC = (SHZ0+SHZ1)/2;   // ducto 2.1 ext (1.8 libre)
const EXC = (EDI.x0 + EDI.x1) / 2;             // centro del edificio

// ---------- Escena base ----------
const container = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xd7e4ee, 110, 300);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 700);
camera.position.set(-16, 10, 40);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(22, 0, 10);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.52;
controls.minDistance = 2;
controls.maxDistance = 170;

const skyGeo = new THREE.SphereGeometry(320, 24, 12);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: { top:{value:new THREE.Color(0x6fa8dc)}, bottom:{value:new THREE.Color(0xe3edf5)} },
  vertexShader: 'varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
  fragmentShader: 'uniform vec3 top; uniform vec3 bottom; varying vec3 vP; void main(){ float h=clamp(vP.y/160.0,0.0,1.0); gl_FragColor=vec4(mix(bottom,top,pow(h,0.6)),1.0); }'
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

const hemi = new THREE.HemisphereLight(0xcfe4f5, 0x8a8272, 0.75);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff2dd, 1.35);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.left = -50; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 55;  sun.shadow.camera.bottom = -45;
sun.shadow.camera.far = 260;
sun.shadow.bias = -0.0004;
scene.add(sun); scene.add(sun.target);
sun.target.position.set(25, 0, 10);

function setSunHour(h) {
  const t = (h - 7) / 10.5;
  const az = THREE.MathUtils.lerp(-2.4, -0.7, t);
  const el = Math.sin(Math.PI * t) * 1.05 + 0.18;
  const R = 110;
  sun.position.set(25 + R*Math.cos(el)*Math.sin(az), R*Math.sin(el), 10 + R*Math.cos(el)*Math.cos(az));
  sun.intensity = 0.7 + 0.8 * Math.sin(Math.PI * t);
  hemi.intensity = 0.5 + 0.35 * Math.sin(Math.PI * t);
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  document.getElementById('sunTime').textContent = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}

// ---------- Texturas ----------
function canvasTex(w, h, draw, rx, ry) {
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(rx||1, ry||1);
  t.anisotropy = 8;
  return t;
}
function noise(g, w, h, a) {
  for (let i=0;i<w*h/14;i++){
    g.fillStyle = 'rgba(' + (Math.random()>0.5?'255,255,255':'0,0,0') + ',' + (Math.random()*a) + ')';
    g.fillRect(Math.random()*w, Math.random()*h, 2, 2);
  }
}
const texBlock = (rx,ry) => canvasTex(512,256,(g,w,h)=>{
  g.fillStyle='#9a978f'; g.fillRect(0,0,w,h);
  for (let y=0,r=0; y<h; y+=50, r++)
    for (let x=-100; x<w+100; x+=100){
      const c=150+Math.random()*22;
      g.fillStyle='rgb('+c+','+(c-3)+','+(c-9)+')';
      g.fillRect(x+(r%2)*50+2, y+2, 96, 46);
    }
  noise(g,w,h,0.06);
}, rx, ry);
const texConcrete = (rx,ry,base) => canvasTex(256,256,(g,w,h)=>{ g.fillStyle=base||'#b8b6b0'; g.fillRect(0,0,w,h); noise(g,w,h,0.10); }, rx, ry);
const texPaint = (rx,ry,base) => canvasTex(128,128,(g,w,h)=>{ g.fillStyle=base; g.fillRect(0,0,w,h); noise(g,w,h,0.05); }, rx, ry);
function sidingTex(c1,c2,c3,c4,rx,ry){
  return canvasTex(256,256,(g,w,h)=>{
    for (let x=0; x<w; x+=32){
      const gr=g.createLinearGradient(x,0,x+32,0);
      gr.addColorStop(0,c1); gr.addColorStop(0.35,c2); gr.addColorStop(0.55,c3); gr.addColorStop(0.75,c4); gr.addColorStop(1,c1);
      g.fillStyle=gr; g.fillRect(x,0,32,h);
    }
    noise(g,w,h,0.05);
  }, rx, ry);
}
const texSidNew = (rx,ry)=> sidingTex('#a8b0b8','#dfe4e8','#c3cad1','#eef1f3',rx,ry);
const texSidOld = (rx,ry)=> sidingTex('#4e565e','#7b848c','#616a72','#868f97',rx,ry);
const texDoor = (rx,ry) => canvasTex(256,256,(g,w,h)=>{
  for (let y=0; y<h; y+=42){
    const gr=g.createLinearGradient(0,y,0,y+42);
    gr.addColorStop(0,'#8f9aa4'); gr.addColorStop(0.5,'#c6cdd4'); gr.addColorStop(1,'#7c8791');
    g.fillStyle=gr; g.fillRect(0,y,w,40);
    g.fillStyle='rgba(40,45,52,0.65)'; g.fillRect(0,y+40,w,2);
  }
}, rx, ry);
const texTeja = (rx,ry) => canvasTex(256,256,(g,w,h)=>{
  g.fillStyle='#8f3d22'; g.fillRect(0,0,w,h);
  const tw=32, th=32;
  for (let y=0,r=0; y<h+th; y+=th, r++){
    for (let x=-tw; x<w+tw; x+=tw){
      const off=(r%2)*tw/2;
      const gr=g.createLinearGradient(x+off,y,x+off,y+th);
      gr.addColorStop(0,'#d97a4a'); gr.addColorStop(0.55,'#b3502e'); gr.addColorStop(1,'#7e3018');
      g.fillStyle=gr;
      g.beginPath(); g.arc(x+off+tw/2, y+th, tw/2-1, Math.PI, 0); g.closePath(); g.fill();
    }
  }
  noise(g,w,h,0.05);
}, rx, ry);
const texRamp = () => canvasTex(256,256,(g,w,h)=>{
  g.fillStyle='#aeaba3'; g.fillRect(0,0,w,h); noise(g,w,h,0.09);
  g.fillStyle='rgba(70,70,70,0.4)';
  for (let y=0; y<h; y+=18) g.fillRect(0,y,w,3);
}, 2, 12);
const texGrass = () => canvasTex(512,512,(g,w,h)=>{
  g.fillStyle='#5e7d43'; g.fillRect(0,0,w,h);
  for (let i=0;i<3200;i++){
    g.fillStyle='rgba('+(60+Math.random()*60|0)+','+(100+Math.random()*60|0)+','+(40+Math.random()*40|0)+',0.5)';
    g.fillRect(Math.random()*w, Math.random()*h, 3, 3);
  }
}, 14, 14);
const texAsphalt = () => canvasTex(256,256,(g,w,h)=>{ g.fillStyle='#3d4045'; g.fillRect(0,0,w,h); noise(g,w,h,0.12); }, 3, 20);
const texFloorTx = () => canvasTex(512,512,(g,w,h)=>{
  g.fillStyle='#a9a7a1'; g.fillRect(0,0,w,h); noise(g,w,h,0.07);
  g.strokeStyle='rgba(60,60,60,0.35)'; g.lineWidth=2;
  for (let x=0;x<=w;x+=128){ g.beginPath(); g.moveTo(x,0); g.lineTo(x,h); g.stroke(); }
  for (let y=0;y<=h;y+=128){ g.beginPath(); g.moveTo(0,y); g.lineTo(w,y); g.stroke(); }
}, 4, 5);
const texReja = () => canvasTex(256,256,(g,w,h)=>{        // reja corrediza (barrotes)
  g.clearRect(0,0,w,h);
  g.fillStyle='#39404a';
  for (let x=0; x<w; x+=22) g.fillRect(x, 0, 7, h);        // barrotes verticales
  g.fillRect(0, 0, w, 9); g.fillRect(0, h-9, w, 9);        // travesaños
  g.fillRect(0, h/2-4, w, 8);
}, 1, 1);
const texSign = () => canvasTex(1024,128,(g,w,h)=>{
  g.fillStyle='#20344d'; g.fillRect(0,0,w,h);
  g.fillStyle='#f2f5f8'; g.font='bold 72px Segoe UI, Arial';
  g.textAlign='center'; g.textBaseline='middle';
  g.fillText('BODEGAS  FARINANGO', w/2, h/2+4);
}, 1, 1);

// ---------- Materiales ----------
const M = {
  block:    new THREE.MeshStandardMaterial({ map:texBlock(5,2), roughness:0.92 }),
  blockLind:new THREE.MeshStandardMaterial({ map:texBlock(12,2.2), roughness:0.92 }),
  concrete: new THREE.MeshStandardMaterial({ map:texConcrete(4,2), roughness:0.85 }),
  paintEdi: new THREE.MeshStandardMaterial({ map:texPaint(4,3,'#ded9cf'), roughness:0.8 }),
  paintInt: new THREE.MeshStandardMaterial({ map:texPaint(3,2,'#e9e6df'), roughness:0.85 }),
  paintDark:new THREE.MeshStandardMaterial({ map:texPaint(3,2,'#8e9296'), roughness:0.8 }),
  sidNew:   new THREE.MeshStandardMaterial({ map:texSidNew(9,1), roughness:0.45, metalness:0.55, side:THREE.DoubleSide }),
  sidOld:   new THREE.MeshStandardMaterial({ map:texSidOld(9,1), roughness:0.55, metalness:0.5, side:THREE.DoubleSide }),
  roofNew:  new THREE.MeshStandardMaterial({ map:texSidNew(11,4), roughness:0.5, metalness:0.5, side:THREE.DoubleSide }),
  roofOld:  new THREE.MeshStandardMaterial({ map:texSidOld(11,4), roughness:0.55, metalness:0.5, side:THREE.DoubleSide }),
  teja:     new THREE.MeshStandardMaterial({ map:texTeja(12,5), roughness:0.85, side:THREE.DoubleSide }),
  glass:    new THREE.MeshPhysicalMaterial({ color:0x88b4c8, transparent:true, opacity:0.42, roughness:0.12, metalness:0.35, side:THREE.DoubleSide }),
  skylight: new THREE.MeshPhysicalMaterial({ color:0xeef4f8, transparent:true, opacity:0.55, roughness:0.4, side:THREE.DoubleSide }),
  frame:    new THREE.MeshStandardMaterial({ color:0x3a4149, roughness:0.5, metalness:0.6 }),
  steel:    new THREE.MeshStandardMaterial({ color:0x4a6d8c, roughness:0.45, metalness:0.65 }),
  steelLight:new THREE.MeshStandardMaterial({ color:0x7e93a6, roughness:0.5, metalness:0.6 }),
  door:     new THREE.MeshStandardMaterial({ map:texDoor(2,2), roughness:0.5, metalness:0.5 }),
  doorPed:  new THREE.MeshStandardMaterial({ color:0x51606e, roughness:0.6, metalness:0.4 }),
  grass:    new THREE.MeshStandardMaterial({ map:texGrass(), roughness:1 }),
  asphalt:  new THREE.MeshStandardMaterial({ map:texAsphalt(), roughness:0.95 }),
  apron:    new THREE.MeshStandardMaterial({ map:texConcrete(10,5,'#c0bdb5'), roughness:0.9 }),
  ramp:     new THREE.MeshStandardMaterial({ map:texRamp(), roughness:0.95 }),
  floor:    new THREE.MeshStandardMaterial({ map:texFloorTx(), roughness:0.85 }),
  wood:     new THREE.MeshStandardMaterial({ color:0x8a6a48, roughness:0.7 }),
  fabric:   new THREE.MeshStandardMaterial({ color:0x3f4650, roughness:0.9 }),
  fixture:  new THREE.MeshStandardMaterial({ color:0xf2f1ec, roughness:0.5 }),
  sofa:     new THREE.MeshStandardMaterial({ color:0x5f6d5a, roughness:0.9 }),
  bed:      new THREE.MeshStandardMaterial({ color:0xcfd8e2, roughness:0.9 }),
  plant:    new THREE.MeshStandardMaterial({ color:0x4a7038, roughness:1 }),
  sign:     new THREE.MeshBasicMaterial({ map:texSign() }),
  reja:     new THREE.MeshStandardMaterial({ map:texReja(), transparent:true, alphaTest:0.45, side:THREE.DoubleSide, roughness:0.55, metalness:0.6 }),
  white:    new THREE.MeshStandardMaterial({ color:0xe8e6e0, roughness:0.85 }),
  trunk:    new THREE.MeshStandardMaterial({ color:0x6b4e34, roughness:1 }),
  leaves:   new THREE.MeshStandardMaterial({ color:0x4a7038, roughness:1 }),
  cabRed:   new THREE.MeshStandardMaterial({ color:0x9e2b25, roughness:0.4, metalness:0.3 }),
  containerB:new THREE.MeshStandardMaterial({ color:0x2b5d8a, roughness:0.6, metalness:0.4 }),
  tire:     new THREE.MeshStandardMaterial({ color:0x1c1e20, roughness:0.95 }),
};

// ---------- Helpers ----------
const world = new THREE.Group(); scene.add(world);
const structure = new THREE.Group(); world.add(structure);
const cladNew = new THREE.Group(); world.add(cladNew);
const medidas = new THREE.Group(); scene.add(medidas);
const ediLevels = LV.map(() => { const g = new THREE.Group(); world.add(g); return g; });
let roofTerraza = new THREE.Group(); ediLevels[4].add(roofTerraza);
const structEdi = new THREE.Group(); structEdi.visible = false; world.add(structEdi);
const XCEN = OPT2 ? 10.5 : 9;                  // columna interior única (retícula ~7.5 m)

function box(w, h, d, x, y, z, mat, parent, shadow=true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (shadow) { m.castShadow = true; m.receiveShadow = true; }
  (parent || world).add(m);
  return m;
}
function wallX(segs, z, mat, parent, th) {
  segs.forEach(s => box(s[1]-s[0], s[3]-s[2], th||T, (s[0]+s[1])/2, (s[2]+s[3])/2, z, mat, parent));

function quad(p, mat, ru, rv, parent) {
  const g = new THREE.BufferGeometry();
  const v = new Float32Array([...p[0],...p[1],...p[2], ...p[0],...p[2],...p[3]]);
  const uv = new Float32Array([0,0, ru,0, ru,rv, 0,0, ru,rv, 0,rv]);
  g.setAttribute('position', new THREE.BufferAttribute(v,3));
  g.setAttribute('uv', new THREE.BufferAttribute(uv,2));
  g.computeVertexNormals();
  const m = new THREE.Mesh(g, mat);
  m.receiveShadow = true;
  (parent || world).add(m);
  return m;
}
const UP = new THREE.Vector3(0,1,0);
function bar(a, b, s, mat, parent) {
  const dir = new THREE.Vector3().subVectors(b, a);
  const m = new THREE.Mesh(new THREE.BoxGeometry(s, dir.length(), s), mat);
  m.position.copy(a).addScaledVector(dir, 0.5);
  m.quaternion.setFromUnitVectors(UP, dir.clone().normalize());
  m.castShadow = true;
  (parent || structure).add(m);
}

function label(text, at, s, parent, accent) {
  const fs=46, pad=22;
  const c=document.createElement('canvas');
  let g=c.getContext('2d'); g.font='600 '+fs+'px Segoe UI, Arial';
  c.width=Math.ceil(g.measureText(text).width)+pad*2; c.height=fs+pad*1.4;
  g=c.getContext('2d'); g.font='600 '+fs+'px Segoe UI, Arial';
  g.fillStyle = accent ? 'rgba(32,52,77,0.88)' : 'rgba(15,20,28,0.75)';
  g.beginPath();
  g.moveTo(14,0); g.lineTo(c.width-14,0); g.quadraticCurveTo(c.width,0,c.width,14);
  g.lineTo(c.width,c.height-14); g.quadraticCurveTo(c.width,c.height,c.width-14,c.height);
  g.lineTo(14,c.height); g.quadraticCurveTo(0,c.height,0,c.height-14);
  g.lineTo(0,14); g.quadraticCurveTo(0,0,14,0); g.fill();
  g.fillStyle = accent ? '#bcd9f7' : '#f0f2f5';
  g.textAlign='center'; g.textBaseline='middle';
  g.fillText(text, c.width/2, c.height/2+3);
  const tex = new THREE.CanvasTexture(c); tex.anisotropy=4;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true }));
  sp.scale.set(s*c.width/c.height, s, 1);
  sp.position.set(...at);
  (parent||medidas).add(sp);
  return sp;
}

/* ============ GALPONES ============ */
function galpon(x0, x1, z0, z1, opts) {
  const g = opts.group || world;
  const zc = (z0+z1)/2;
  const slopePct = (RIDGE-EAVE)/(zc-z0);
  const BASE = FLOOR + (OPT2 ? 3.8 : 3.0);        // muro de hormigón 1.80 + bloque 2.00 (lámina A-3)
  ['S','N'].forEach(cara => {
    const z = cara==='S' ? z1 : z0;
    const doors = (opts.doors||[]).filter(d => d.cara===cara).sort((a,b)=>a.a-b.a);
    let segsB = [], prev = x0;
    doors.forEach(d => { segsB.push([prev, d.a, FLOOR, BASE]); prev = d.b; });
    segsB.push([prev, x1, FLOOR, BASE]);
    doors.forEach(d => { if (FLOOR+d.h < BASE) segsB.push([d.a, d.b, FLOOR+d.h, BASE]); });
    wallX(segsB, z, M.block, g);
    if (OPT2 && !doors.length) box(x1-x0, 1.8, T+0.06, (x0+x1)/2, FLOOR+0.9, z, M.concrete, g);   // "murro" 1.80 (lámina A-3)
    let segsS = [], prev2 = x0;
    const tall = doors.filter(d => FLOOR+d.h > BASE);
    tall.forEach(d => { segsS.push([prev2, d.a, BASE, EAVE]); prev2 = d.b; });
    segsS.push([prev2, x1, BASE, EAVE]);
    tall.forEach(d => segsS.push([d.a, d.b, FLOOR+d.h, EAVE]));
    wallX(segsS, z, opts.sid, opts.clad || g);
    for (let x=x0+2; x<x1-1.5; x+=3.6) {
      if (doors.some(d => x > d.a-1 && x < d.b+1)) continue;
      box(1.5, 0.9, 0.06, x+0.75, BASE+0.75, z + (cara==='S'?0.11:-0.11), M.glass, opts.clad || g, false);
    }
    doors.forEach(d => { if (!d.open) box(d.b-d.a-0.15, d.h-0.08, 0.1, (d.a+d.b)/2, FLOOR+d.h/2, z - (cara==='S'?0.06:-0.06), d.ped ? M.doorPed : M.door, opts.clad || g); });
  });
  ['W','E'].forEach(cara => {
    if (opts.skip && opts.skip.includes(cara)) return;
    const x = cara==='W' ? x0 : x1;
    const doors = (opts.doors||[]).filter(d => d.cara===cara).sort((a,b)=>a.a-b.a);
    let segsB = [], prev = z0;
    doors.forEach(d => { segsB.push([prev, d.a, FLOOR, BASE]); prev = d.b; });
    segsB.push([prev, z1, FLOOR, BASE]);
    doors.forEach(d => { if (FLOOR+d.h < BASE) segsB.push([d.a, d.b, FLOOR+d.h, BASE]); });
    wallZ(segsB, x, M.block, g);
    const sh = new THREE.Shape();
    sh.moveTo(z0, BASE); sh.lineTo(z1, BASE); sh.lineTo(z1, EAVE);
    sh.lineTo(zc, RIDGE); sh.lineTo(z0, EAVE); sh.closePath();
    doors.filter(d => FLOOR+d.h > BASE).forEach(d => {
      const hole = new THREE.Path();
      hole.moveTo(d.a, BASE-0.01); hole.lineTo(d.b, BASE-0.01);
      hole.lineTo(d.b, FLOOR+d.h); hole.lineTo(d.a, FLOOR+d.h); hole.closePath();
      sh.holes.push(hole);
    });
    const geo = new THREE.ExtrudeGeometry(sh, { depth:T, bevelEnabled:false });
    const mesh = new THREE.Mesh(geo, opts.sid);
    mesh.rotation.y = -Math.PI/2;
    mesh.position.set(x + T/2, 0, 0);
    mesh.castShadow = mesh.receiveShadow = true;
    (opts.clad || g).add(mesh);
    doors.forEach(d => { if (!d.open) box(0.1, d.h-0.08, d.b-d.a-0.15, x + (cara==='W'?0.06:-0.06), FLOOR+d.h/2, (d.a+d.b)/2, M.door, opts.clad || g); });
  });
  const ov = 0.35, roofW = (x1-x0)+0.7;
  const runS = (z1+ov)-zc;
  const ang = Math.atan(slopePct);
  const len = Math.sqrt(runS*runS + Math.pow(runS*slopePct,2));
  const yE = RIDGE - runS*slopePct;
  [1,-1].forEach(sgn => {
    const p = new THREE.Mesh(new THREE.PlaneGeometry(roofW, len), opts.roof);
    p.rotation.x = -Math.PI/2 + sgn*ang;
    p.position.set((x0+x1)/2, (RIDGE+yE)/2 + 0.05, zc + sgn*runS/2);
    p.castShadow = p.receiveShadow = true;
    (opts.clad || g).add(p);
  });
  box(roofW, 0.09, 0.5, (x0+x1)/2, RIDGE+0.1, zc, M.steelLight, opts.clad || g);
  (opts.sky||[]).forEach(x => {
    [1,-1].forEach(sgn => {
      const p = new THREE.Mesh(new THREE.PlaneGeometry(1.5, len-1.4), M.skylight);
      p.rotation.x = -Math.PI/2 + sgn*ang;
      p.position.set(x, (RIDGE+yE)/2 + 0.11, zc + sgn*runS/2);
      (opts.clad || g).add(p);
    });
  });
  const f = new THREE.Mesh(new THREE.PlaneGeometry(x1-x0-0.1, z1-z0-0.1), M.floor);
  f.rotation.x = -Math.PI/2;
  f.position.set((x0+x1)/2, FLOOR+0.02, (z0+z1)/2);
  f.receiveShadow = true;
  g.add(f);
}

(function(){

  function gableTruss(x) {
    const d = 0.62, N = 12, zs = [];
    for (let i=0;i<=N;i++) zs.push(z0 + (z1-z0)*i/N);
    for (let i=0;i<N;i++) {
      bar(V(x,yAt(zs[i]),zs[i]),   V(x,yAt(zs[i+1]),zs[i+1]),   0.09, M.steel);
      bar(V(x,yAt(zs[i])-d,zs[i]), V(x,yAt(zs[i+1])-d,zs[i+1]), 0.09, M.steel);
      const zm = (zs[i]+zs[i+1])/2;
      bar(V(x,yAt(zs[i])-d,zs[i]), V(x,yAt(zm),zm), 0.055, M.steelLight);
      bar(V(x,yAt(zm),zm), V(x,yAt(zs[i+1])-d,zs[i+1]), 0.055, M.steelLight);
      bar(V(x,yAt(zs[i]),zs[i]), V(x,yAt(zs[i])-d,zs[i]), 0.055, M.steelLight);
    }
    bar(V(x,yAt(z1),z1), V(x,yAt(z1)-d,z1), 0.055, M.steelLight);
  }
  (OPT2 ? axes : [21.0, 27.0, GN.x1-0.3]).forEach(gableTruss);
  function eaveTruss(z) {
    const yT = EAVE-0.05, yB = EAVE-0.62;
    bar(V(GN.x0+0.3,yT,z), V(GN.x1-0.3,yT,z), 0.08, M.steel);
    bar(V(GN.x0+0.3,yB,z), V(GN.x1-0.3,yB,z), 0.08, M.steel);
    const n=16, L=(GN.x1-0.3)-(GN.x0+0.3);
    for (let i=0;i<n;i++){
      const xa=GN.x0+0.3+L*i/n, xb=GN.x0+0.3+L*(i+1)/n, xm=(xa+xb)/2;
      bar(V(xa,yB,z), V(xm,yT,z), 0.05, M.steelLight);
      bar(V(xm,yT,z), V(xb,yB,z), 0.05, M.steelLight);
      bar(V(xa,yT,z), V(xa,yB,z), 0.05, M.steelLight);
    }
  }
  eaveTruss(z0); eaveTruss(z1);
  for (let i=0;i<=6;i++){
    const t=i/6;
    [1,-1].forEach(sgn => {
      const z = zc + sgn*t*(z1-zc);
      box(GN.x1-GN.x0, 0.1, 0.05, (GN.x0+GN.x1)/2, yAt(z)-0.06, z, M.steelLight, structure, false);
    });
  }
})();

function setLevels(k, hideRoof) {
  ediLevels.forEach((g,i) => g.visible = i <= k);
  roofTerraza.visible = k >= 4 && !hideRoof;
}
let camAnim = null;
function goView(name) {
  const v = VIEWS[name];
  if (structEdi.visible) { structEdi.visible = false; document.getElementById('chkStructEdi').checked = false; }
  if (v.level !== undefined) setLevels(v.level, v.hideRoof);
  else setLevels(4, false);
  camAnim = { t:0, p0:camera.position.clone(), p1:V(...v.pos), t0:controls.target.clone(), t1:V(...v.tgt) };
  document.querySelectorAll('#views .btn').forEach(b => b.classList.toggle('on', b.dataset.view === name));
}
// rotular los botones de nivel con las cotas reales de la opción activa
document.querySelectorAll('#views .btn[data-lv]').forEach(b => {
  const v = LV[+b.dataset.lv];
  const cota = 'N ' + (v > 0 ? '+' : v < 0 ? '−' : '') + Math.abs(v).toFixed(2);
  b.textContent = '− ' + cota + ' · ' + b.textContent.split('·').pop().trim();
});

});
document.getElementById('chkRotate').addEventListener('change', e => { controls.autoRotate = e.target.checked; controls.autoRotateSpeed = 0.9; });
document.getElementById('chkMedidas').addEventListener('change', e => { medidas.visible = e.target.checked; });

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const ease = t => t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (camAnim) {
    camAnim.t += dt / 1.1;
    const k = ease(Math.min(1, camAnim.t));
    camera.position.lerpVectors(camAnim.p0, camAnim.p1, k);
    controls.target.lerpVectors(camAnim.t0, camAnim.t1, k);
    if (camAnim.t >= 1) camAnim = null;
  }
  controls.update();
  renderer.render(scene, camera);
}
setSunHour(10.5);
goView('esquina');
animate();
document.getElementById('loading').classList.add('hidden');
